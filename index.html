<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulo NHS | Library System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-overlay"></div>
        
        <div class="login-box">
            <div class="login-logo">
                <i class="fas fa-university"></i>
                <h1>Pulo NHS</h1>
                <p>Library Management System</p>
            </div>

            <div id="loginSection">
                <form id="loginForm">
                    <div class="role-selector">
                        <div class="role-option active" data-role="User">
                            <i class="fas fa-user-graduate"></i><span>Student</span>
                        </div>
                        <div class="role-option" data-role="staff">
                            <i class="fas fa-user-tie"></i><span>Staff</span>
                        </div>
                        <div class="role-option" data-role="admin">
                            <i class="fas fa-user-shield"></i><span>Admin</span>
                        </div>
                    </div>
                    <input type="text" class="form-control" placeholder="Username" required>
                    <input type="password" class="form-control" placeholder="Password" required>
                    <button type="submit" class="btn-login">SIGN IN</button>
                </form>
                <p class="toggle-text">Don't have an account? <a href="#" id="showRegister">Register here</a></p>
            </div>

            <div id="registerSection" style="display: none;">
                <h2 style="margin-bottom: 15px; color: var(--primary-dark);">Create Account</h2>
                <form id="registerForm">
                    <input type="text" class="form-control" placeholder="Full Name" required>
                    <input type="text" class="form-control" placeholder="Student ID (e.g. 2026-10452)" required>
                    <input type="email" class="form-control" placeholder="School Email" required>
                    <input type="password" class="form-control" placeholder="Create Password" required>
                    <button type="submit" class="btn-login" style="background: var(--accent); color: var(--primary-dark);">REGISTER</button>
                </form>
                <p class="toggle-text">Already have an account? <a href="#" id="showLogin">Sign In</a></p>
            </div>
        </div>
    </div>

    <script>
        // TOGGLE BETWEEN LOGIN AND REGISTER
        const loginSection = document.getElementById('loginSection');
        const registerSection = document.getElementById('registerSection');
        const showRegister = document.getElementById('showRegister');
        const showLogin = document.getElementById('showLogin');

        showRegister.addEventListener('click', (e) => {
            e.preventDefault();
            loginSection.style.display = 'none';
            registerSection.style.display = 'block';
        });

        showLogin.addEventListener('click', (e) => {
            e.preventDefault();
            registerSection.style.display = 'none';
            loginSection.style.display = 'block';
        });

        // ROLE SELECTION LOGIC
        document.querySelectorAll('.role-option').forEach(option => {
            option.addEventListener('click', function() {
                document.querySelectorAll('.role-option').forEach(opt => opt.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // LOGIN REDIRECTION
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const activeRole = document.querySelector('.role-option.active').getAttribute('data-role');
            
            if (activeRole === 'User') {
                window.location.href = "student/studentdashboard.html";
            } else if (activeRole === 'staff') {
                window.location.href = "staff/staffdashboard.html";
            } else if (activeRole === 'admin') {
                window.location.href = "admin/admindashboard.html";
            }
        });

        // REGISTRATION LOGIC (SIMULATED)
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Registration Successful! Please log in.');
            registerSection.style.display = 'none';
            loginSection.style.display = 'block';
        });
    </script>
</body>
</html>
